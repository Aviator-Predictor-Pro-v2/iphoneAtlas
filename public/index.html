<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Phone frame */
    .phone {
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
      background: #fff;
      border-radius: 50px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(0,0,0,0.07);
    }

    /* Gradient background – top ~52% */
    .gradient-header {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 52%;
      background: radial-gradient(ellipse 90% 90% at 50% 5%,
        #1e20cc 0%,
        #3a3ef0 20%,
        #6b72f5 42%,
        #b8bcfc 65%,
        #ffffff 100%);
      z-index: 0;
    }

    /* Pages */
    .page {
      position: absolute;
      inset: 0;
      display: none;
      background: #fff;
    }
    .page.active { display: block; }

    /* Logo centered in gradient area — uses YOUR logo.png */
    .header-logo {
      position: absolute;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 36px;
      object-fit: contain;
      z-index: 5;
    }

    /* ══════════════════
       PAGE 1 – Get Started
    ══════════════════ */
    #page1 .bottom-content {
      position: absolute;
      bottom: 64px;
      left: 0; right: 0;
      padding: 0 28px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .logo-block img {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }
    .logo-wordmark {
      font-size: 44px;
      font-weight: 800;
      color: #111;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .lang-label {
      font-size: 14px;
      color: #555;
      text-align: center;
    }
    .lang-select {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 14px;
      padding: 15px 18px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .lang-left { display: flex; align-items: center; gap: 10px; font-size: 15px; color: #222; }
    .chevron { font-size: 18px; color: #888; }

    .btn-blue {
      width: 100%;
      padding: 17px;
      background: #4a4ff0;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-blue:hover { opacity: 0.9; }

    /* ══════════════════
       PAGE 2 – Email
    ══════════════════ */
    #page2 .main-content {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      padding: 28px 28px 0;
      z-index: 5;
    }

    .envelope {
      width: 36px;
      height: 28px;
      background: #4a4ff0;
      border-radius: 5px;
      position: relative;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .envelope::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      border-top: 14px solid #3035dd;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
    }

    .page-title {
      font-size: 26px;
      font-weight: 700;
      color: #4a4ff0;
      margin-bottom: 22px;
    }

    .input-field {
      width: 100%;
      background: #f2f2f7;
      border: 1.5px solid #e5e5ea;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 16px;
      color: #222;
      outline: none;
    }
    .input-field::placeholder { color: #aaa; }
    .input-field:focus { border-color: #4a4ff0; background: #fff; }

    .btn-continue {
      width: 100%;
      padding: 17px;
      margin-top: 18px;
      background: #4a4ff0;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    .btn-continue.show { display: block; }

    /* ══════════════════
       PAGE 3 – Verify
    ══════════════════ */
    #page3 .main-content {
      position: absolute;
      top: 48%;
      left: 0; right: 0;
      padding: 28px 28px 0;
      z-index: 5;
    }

    .verify-title {
      font-size: 26px;
      font-weight: 700;
      color: #4a4ff0;
      margin-bottom: 10px;
    }
    .verify-sub {
      font-size: 14px;
      color: #444;
      line-height: 1.55;
      margin-bottom: 26px;
    }

    .otp-row {
      display: flex;
      gap: 9px;
      margin-bottom: 14px;
    }
    .otp-box {
      flex: 1;
      height: 60px;
      background: #efefef;
      border: none;
      border-radius: 12px;
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      color: #222;
      outline: none;
    }
    .otp-box:focus { background: #e2e2f0; }

    .resend {
      font-size: 14px;
      color: #666;
      margin-bottom: 26px;
    }

    .btn-verify {
      width: 100%;
      padding: 17px;
      background: #c5c8fb;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: default;
    }
    .btn-verify.active {
      background: #4a4ff0;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- ══════════════════════════════
       PAGE 1 – Get Started
  ══════════════════════════════ -->
  <div class="page active" id="page1">
    <div class="gradient-header"></div>

    <!-- YOUR logo centered in gradient -->
    <img src="logo.png" class="header-logo" alt="logo" />

    <div class="bottom-content">
      <!-- Logo + wordmark -->
      <div class="logo-block">
        <img src="logo.png" alt="Atlas logo" />
        <span class="logo-wordmark">atlas</span>
      </div>

      <!-- Language picker -->
      <div style="width:100%">
        <p class="lang-label">Select Language</p>
        <div class="lang-select" style="margin-top:8px;">
          <div class="lang-left">
            <span>🇺🇸</span>
            <span>English</span>
          </div>
          <span class="chevron">⌄</span>
        </div>
      </div>

      <button class="btn-blue" onclick="goTo('page2')">Get Started</button>
    </div>
  </div>


  <!-- ══════════════════════════════
       PAGE 2 – Email
  ══════════════════════════════ -->
  <div class="page" id="page2">
    <div class="gradient-header"></div>
    <img src="logo.png" class="header-logo" alt="logo" />

    <div class="main-content">
      <div class="envelope"></div>
      <h2 class="page-title">What's your email?</h2>
      <input
        class="input-field"
        type="email"
        id="emailInput"
        placeholder="example@email.com"
        oninput="checkEmail()"
      />
      <button class="btn-continue" id="continueBtn" onclick="goTo('page3')">Continue</button>
    </div>
  </div>


  <!-- ══════════════════════════════
       PAGE 3 – Verify Email
  ══════════════════════════════ -->
  <div class="page" id="page3">
    <div class="gradient-header"></div>
    <img src="logo.png" class="header-logo" alt="logo" />

    <div class="main-content">
      <h2 class="verify-title">Verify your email</h2>
      <p class="verify-sub">
        An email with a verification code was just sent to
        <span id="emailDisplay" style="color:#111;"></span>
      </p>

      <div class="otp-row">
        <input class="otp-box" maxlength="1" type="tel" oninput="otpMove(this,0)" />
        <input class="otp-box" maxlength="1" type="tel" oninput="otpMove(this,1)" />
        <input class="otp-box" maxlength="1" type="tel" oninput="otpMove(this,2)" />
        <input class="otp-box" maxlength="1" type="tel" oninput="otpMove(this,3)" />
        <input class="otp-box" maxlength="1" type="tel" oninput="otpMove(this,4)" />
        <input class="otp-box" maxlength="1" type="tel" oninput="otpMove(this,5)" />
      </div>

      <p class="resend" id="resendText">Resend in 11s</p>
      <button class="btn-verify" id="verifyBtn">Verify</button>
    </div>
  </div>

</div>

<script>
  function goTo(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'page3') {
      const email = document.getElementById('emailInput').value.trim();
      document.getElementById('emailDisplay').textContent = email;
      startTimer();
    }
  }

  function checkEmail() {
    const v = document.getElementById('emailInput').value.trim();
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    document.getElementById('continueBtn').classList.toggle('show', ok);
  }

  function otpMove(el, i) {
    const boxes = document.querySelectorAll('.otp-box');
    if (el.value.length === 1 && i < 5) boxes[i+1].focus();
    const full = [...boxes].every(b => b.value !== '');
    document.getElementById('verifyBtn').classList.toggle('active', full);
  }

  let timer;
  function startTimer() {
    clearInterval(timer);
    let s = 11;
    const el = document.getElementById('resendText');
    el.style.color = '#666';
    el.textContent = 'Resend in ' + s + 's';
    timer = setInterval(() => {
      s--;
      if (s > 0) { el.textContent = 'Resend in ' + s + 's'; }
      else { clearInterval(timer); el.textContent = 'Resend code'; el.style.color = '#4a4ff0'; }
    }, 1000);
  }
</script>
</body>
</html>
